name: cache Data DVC por 

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  prepare-environment:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restaurar o guardar caché del .venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements2-mlops.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Crear/validar .venv e instalar dependencias
        run: |
          set -e
          if [ "${{ steps.cache-venv.outputs.cache-hit }}" != "true" ]; then
            echo "Cache miss: recreando .venv"
            rm -rf .venv
            python -m venv .venv
            source .venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r requirements2-mlops.txt
          elif [ ! -x .venv/bin/python ]; then
            echo "Cache corrupta: .venv/bin/python no existe, recreando .venv"
            rm -rf .venv
            python -m venv .venv
            source .venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r requirements2-mlops.txt
          else
            echo "Cache hit valido: .venv reutilizable"
          fi

  dvc-check:
    needs: prepare-environment
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
      G_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.G_DRIVE_SERVICE_ACCOUNT_JSON }}
      TOKEN_GDRIVE_JSON: ${{ secrets.TOKEN_GDRIVE_JSON }}
      TOKEN_GDRIVE_DVC_JSON: ${{ secrets.TOKEN_GDRIVE_DVC_JSON }}
      FASE0_FOLDER_ID: ${{ vars.FASE0_FOLDER_ID }}
      FASE1_FOLDER_ID: ${{ vars.FASE1_FOLDER_ID }}
      FASE2_FOLDER_ID: ${{ vars.FASE2_FOLDER_ID }}

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restaurar caché del .venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements2-mlops.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Validar .venv restaurado
        run: |
          if [ ! -x .venv/bin/python ]; then
            echo "No se encontro .venv/bin/python en este job"
            echo "Revisa la cache o vuelve a ejecutar para regenerarla"
            exit 1
          fi

      - name: Añadir .venv/bin al PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Validar secrets requeridos
        run: |
          test -n "$GDRIVE_CLIENT_ID" || (echo "Falta secret GDRIVE_CLIENT_ID" && exit 1)
          test -n "$GDRIVE_CLIENT_SECRET" || (echo "Falta secret GDRIVE_CLIENT_SECRET" && exit 1)
          test -n "$FASE0_FOLDER_ID" || (echo "Falta variable FASE0_FOLDER_ID" && exit 1)
          test -n "$TOKEN_GDRIVE_DVC_JSON" || (echo "Falta secret TOKEN_GDRIVE_DVC_JSON" && exit 1)

      - name: Crear token.json de GDrive
        run: |
          # Token para DVC (debe coincidir con dvc_engine-data.py)
          printf '%s' "$TOKEN_GDRIVE_DVC_JSON" > .mlops_tools/credentials/dvc_token.json
          test -s .mlops_tools/credentials/dvc_token.json || (echo "token_dvc.json vacio" && exit 1)
          
          # Token para GDRIVE (debe coincidir con gdrive_ctrl.py)
          printf '%s' "$TOKEN_GDRIVE_JSON" > .mlops_tools/credentials/gdrive_token.json
          test -s .mlops_tools/credentials/gdrive_token.json || (echo "token_gdrive.json vacio" && exit 1)
          
          # Credenciales de ACCOUNT SERVICE 
          printf '%s' "$G_DRIVE_SERVICE_ACCOUNT_JSON" > .mlops_tools/credentials/service_account.json
          test -s .mlops_tools/credentials/service_account.json || (echo "service_account.json vacio" && exit 1)


      - name: Configurar DVC remote (GDrive)
        working-directory: .mlops_tools
        run: make dvc_setup_fase0

      - name: Descargar datos de DVC
        working-directory: .mlops_tools
        run: make dvc_pull_fase0 

      - name: Verificar que los datos se descargaron
        run: |
          ls -la data
          wc data/raw.csv

# --- NUEVO PASO ---
      - name: Subir raw.csv como Artifact
        uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: data/ # Se subirá toda la carpeta data/ (incluyendo raw.csv)
          retention-days: 1

  fase1_variant:
    needs: dvc-check
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restaurar caché del .venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements2-mlops.txt') }}

      - name: Añadir .venv/bin al PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      # Descargamos el data/raw.csv del job anterior
      - name: Descargar Artifact de datos raw
        uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: data/

      - name: Crear variante Fase 1
        working-directory: .mlops_tools
        # Ojo: si estás en .mlops_tools, la ruta a data suele ser ../data/raw.csv
        run: make variant1 VARIANT=v001 RAW=../data/raw.csv CLEANING_STRATEGY=basic NAN_VALUES="[-999999]"

      # Subimos el resultado de este paso para el siguiente
      - name: Subir resultados de la variante
        uses: actions/upload-artifact@v4
        with:
          name: variant-v001-data
          # IMPORTANTE: Cambia esta ruta a la carpeta donde tu makefile guarde los resultados de variant1
          path: .mlops_tools/v001/ 
          retention-days: 1

  fase1_run:
    needs: fase1_variant
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restaurar caché del .venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements2-mlops.txt') }}

      - name: Añadir .venv/bin al PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      # Descargamos los datos que generó fase1_variant
      - name: Descargar Artifact de la variante
        uses: actions/download-artifact@v4
        with:
          name: variant-v001-data
          path: .mlops_tools/v001/

      - name: Ejecutar script de Fase 1
        working-directory: .mlops_tools
        run: make script1-run VARIANT=v001

      # Volvemos a subir los datos actualizados (modelos, métricas, etc.)
      - name: Subir ejecución de Fase 1
        uses: actions/upload-artifact@v4
        with:
          name: run-v001-results
          path: .mlops_tools/v001/
          retention-days: 1

  fase1_check:
    needs: fase1_run
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restaurar caché del .venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements2-mlops.txt') }}

      - name: Añadir .venv/bin al PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      # Descargamos los resultados finales para hacer el check
      - name: Descargar resultados de Fase 1
        uses: actions/download-artifact@v4
        with:
          name: run-v001-results
          path: .mlops_tools/v001/

      - name: Verificar resultados de Fase 1
        working-directory: .mlops_tools
        run: make script1-check-results VARIANT=v001