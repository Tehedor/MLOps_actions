name: Pipeline MLOps - DVC y Fases

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  init-gdrive:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/reusable_prepare_gdrive.yml
    secrets:
      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
      G_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.G_DRIVE_SERVICE_ACCOUNT_JSON }}
      TOKEN_GDRIVE_JSON: ${{ secrets.TOKEN_GDRIVE_JSON }}
      TOKEN_GDRIVE_DVC_JSON: ${{ secrets.TOKEN_GDRIVE_DVC_JSON }}

  # [DESCOMENTA ESTO SOLO LA PRIMERA VEZ O CUANDO NECESITES SINCRONIZAR VARIANTS.YAML DEL REPO]
  init-sync-variants:
    needs: init-gdrive
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/reusable_sync_initial_variants.yml
    secrets:
      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
      FASE1_FOLDER_ID: ${{ secrets.FASE1_FOLDER_ID }}
      FASE2_FOLDER_ID: ${{ secrets.FASE2_FOLDER_ID }}
      FASE3_FOLDER_ID: ${{ secrets.FASE3_FOLDER_ID }}
      FASE4_FOLDER_ID: ${{ secrets.FASE4_FOLDER_ID }}
      FASE5_FOLDER_ID: ${{ secrets.FASE5_FOLDER_ID }}
      FASE6_FOLDER_ID: ${{ secrets.FASE6_FOLDER_ID }}
      FASE7_FOLDER_ID: ${{ secrets.FASE7_FOLDER_ID }}

  fase0-fase1:
    needs: init-gdrive
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/tehedor/mlops_actions/mlops-env:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
      FASE0_FOLDER_ID: ${{ secrets.FASE0_FOLDER_ID }}
      FASE1_FOLDER_ID: ${{ secrets.FASE1_FOLDER_ID }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Descargar credenciales de GDrive
        uses: actions/download-artifact@v4
        with:
          name: gdrive-credentials
          path: .mlops_tools/credentials/

      - name: Configurar DVC remote (GDrive)
        working-directory: .mlops_tools
        run: make dvc_setup_fase0

      - name: Descargar datos de DVC
        working-directory: .mlops_tools
        run: make dvc_pull_fase0 

      - name: Verificar que los datos se descargaron
        run: |
          ls -la data
          wc data/raw.csv

      # - name: Subir raw.csv como Artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: raw-data
      #     path: data/
      #     retention-days: 1

      - name: Pull variants de la fase 1 (Si existen)
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make pull_variant_from_storage_fase1 || echo "[WARN] No hay variantes remotas de F1"
          
      - name: Crear variante Fase 1
        run: make variant1 VARIANT=v001 RAW=./data/raw.csv CLEANING_STRATEGY=basic NAN_VALUES="[-999999]"

      - name: Subir resultados de la variante
        uses: actions/upload-artifact@v4
        with:
          name: variant-f1v001-variants
          path: executions/01_explore/variants.yaml 
          retention-days: 1

      - name: Push variants de la fase 1
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make push_variant_to_storage_fase1

      - name: Ejecutar script de Fase 1
        run: make script1-run VARIANT=v001

      - name: Subir ejecución de Fase 1
        uses: actions/upload-artifact@v4
        with:
          name: run-f1v001-results
          path: executions/01_explore/v001/
          retention-days: 1

      - name: Subir variante v001 a GDrive
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make push_to_storage_fase1 VARIANT=v001

      - name: Verificar resultados de Fase 1
        run: make script1-check-results VARIANT=v001


  fase2:
    needs: fase0-fase1
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/tehedor/mlops_actions/mlops-env:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
      FASE1_FOLDER_ID: ${{ secrets.FASE1_FOLDER_ID }}
      FASE2_FOLDER_ID: ${{ secrets.FASE2_FOLDER_ID }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Descargar credenciales de GDrive
        uses: actions/download-artifact@v4
        with:
          name: gdrive-credentials
          path: .mlops_tools/credentials/

      - name: Descargar Artifact de fase 1 variants
        uses: actions/download-artifact@v4
        with:
          name: variant-f1v001-variants
          path: executions/01_explore/

      - name: Descargar Artifact de fase 1
        uses: actions/download-artifact@v4
        with:
          name: run-f1v001-results
          path: executions/01_explore/v001/

      - name: "[SYNC] Push variants de la fase 1"
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make push_variant_to_storage_fase1

      - name: "[SYNC] Push variante padre (v001) a GDrive"
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make push_to_storage_fase1 VARIANT=v001

      - name: Crear variante Fase 2
        run: make variant2 VARIANT=v011 PARENT=v001 BANDS="20 60 80" STRATEGY=transitions NAN=discard

      - name: Subir resultados de la variante
        uses: actions/upload-artifact@v4
        with:
          name: variant-f2v011-variants
          path: executions/02_prepareeventsds/variants.yaml 
          retention-days: 1

      - name: "[SYNC] Push variants de la fase 2"
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make push_variant_to_storage_fase2

      - name: Ejecutar script de Fase 2
        run: make script2-run VARIANT=v011

      - name: Subir ejecución de Fase 2
        uses: actions/upload-artifact@v4
        with:
          name: run-f2v011-results
          path: executions/02_prepareeventsds/v011/
          retention-days: 1

      - name: "[SYNC] Push variante (v011) a GDrive"
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make push_to_storage_fase2 VARIANT=v011

      - name: Verificar resultados de Fase 2
        run: make script2-check-results VARIANT=v011

  fase3:
    needs: fase2
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64, self-hosted-tehelab]
    container:
      image: ghcr.io/tehedor/mlops_actions/mlops-env:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
      FASE2_FOLDER_ID: ${{ secrets.FASE2_FOLDER_ID }}
      FASE3_FOLDER_ID: ${{ secrets.FASE3_FOLDER_ID }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Descargar credenciales de GDrive
        uses: actions/download-artifact@v4
        with:
          name: gdrive-credentials
          path: .mlops_tools/credentials/

      - name: Descargar Artifact de fase 2 variants
        uses: actions/download-artifact@v4
        with:
          name: variant-f2v011-variants
          path: executions/02_prepareeventsds/

      - name: Descargar Artifact de fase 2
        uses: actions/download-artifact@v4
        with:
          name: run-f2v011-results
          path: executions/02_prepareeventsds/v011/

      - name: "[SYNC] Push variants de la fase 2"
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make push_variant_to_storage_fase2

      - name: "[SYNC] Push variante padre (v011) a GDrive"
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make push_to_storage_fase2 VARIANT=v011
      
      - name: Crear variante Fase 3
        run: make variant3 VARIANT=v111 PARENT=v011 OW=600 LT=300 PW=600 WS=synchro NAN=discard
        # run: make variant3 VARIANT=v111 PARENT=v011 OW=600 LT=300 PW=600 WS=synchro NAN=preserve
        
      - name: Subir resultados de la variante
        uses: actions/upload-artifact@v4
        with:
          name: variant-f3v111-variants
          path: executions/03_preparewindowsds/variants.yaml
          retention-days: 1

      - name: "[SYNC] Push variants de la fase 3"
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make push_variant_to_storage_fase3

      # - name: Ejecutar script de Fase 3
      #   run: make script3-run VARIANT=v111

      - name: Ejecutar script de Fase 3 (Con monitor de RAM)
        env:
          PYTHONFAULTHANDLER: 1 # Fuerza a Python a escupir todo el log si el sistema lo mata
        run: |
          # 1. Lanzamos un bucle en segundo plano que imprima la RAM cada 10 segundos
          (while true; do echo "[$(date '+%H:%M:%S')] RAM Libre:"; free -m | grep Mem; sleep 10; done) &
          MONITOR_PID=$!
          
          # 2. Ejecutamos tu script normal
          make script3-run VARIANT=v111
          
          # 3. Si termina bien, matamos el monitor de RAM
          kill $MONITOR_PID

      - name: Diagnóstico de error (Solo si falla)
        if: failure() # Esto hace que SOLO se ejecute si el paso anterior peta
        run: |
          echo "==== BUSCANDO ERRORES DE OUT OF MEMORY (OOM) ===="
          # Intentamos leer el dmesg del host (puede requerir privilegios en LXC)
          dmesg -T | grep -i -E "killed|oom|out of memory" || echo "No hay logs de OOM en dmesg."
          
          echo "==== ESTADO FINAL DE LA MEMORIA ===="
          free -m

      - name: Subir ejecución de Fase 3
        uses: actions/upload-artifact@v4
        with:
          name: run-f3v111-results
          path: executions/03_preparewindowsds/v111/
          retention-days: 1

      - name: "[SYNC] Push variante (v111) a GDrive"
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make push_to_storage_fase3 VARIANT=v111
        
      - name: Verificar resultados de Fase 3
        run: make script3-check-results VARIANT=v111
        
  fase4:
    needs: fase3
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    # runs-on: ubuntu-latest
    runs-on: [self-hosted, Linux, X64, self-hosted-tehelab]
    container:
      image: ghcr.io/tehedor/mlops_actions/mlops-env:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
      FASE3_FOLDER_ID: ${{ secrets.FASE3_FOLDER_ID }}
      FASE4_FOLDER_ID: ${{ secrets.FASE4_FOLDER_ID }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Descargar credenciales de GDrive
        uses: actions/download-artifact@v4
        with:
          name: gdrive-credentials
          path: .mlops_tools/credentials/

      - name: Descargar Artifact de fase 2 variants
        uses: actions/download-artifact@v4
        with:
          name: variant-f2v011-variants
          path: executions/02_prepareeventsds/

      - name: Descargar Artifact de fase 2
        uses: actions/download-artifact@v4
        with:
          name: run-f2v011-results
          path: executions/02_prepareeventsds/v011/

      - name: Descargar Artifact de fase 3 variants
        uses: actions/download-artifact@v4
        with:
          name: variant-f3v111-variants
          path: executions/03_preparewindowsds/

      - name: Descargar Artifact de fase 3
        uses: actions/download-artifact@v4
        with:
          name: run-f3v111-results
          path: executions/03_preparewindowsds/v111/

      - name: "[SYNC] Push variants de la fase 3"
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make push_variant_to_storage_fase3

      - name: "[SYNC] Push variante padre (v111) a GDrive"
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make push_to_storage_fase3 VARIANT=v111
      
      - name: Crear variante Fase 4
        run: |
          make variant4 VARIANT=v201 PARENT=v111 PREDICTION_NAME=molamas OBJECTIVE="{operator: OR, events: [Battery_Active_Power_0_20-to-80_100, Battery_Active_Power_20_60-to-80_100, Battery_Active_Power_60_80-to-80_100]}"

      - name: Validar objetivo Fase 4 contra catálogo Fase 2
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          try:
            import yaml
          except ImportError:
            print("[ERROR] PyYAML no está instalado en la imagen.")
            sys.exit(1)

          catalog_path = Path("executions/02_prepareeventsds/v011/02_prepareeventsds_event_catalog.json")
          params_path = Path("executions/04_targetengineering/v201/params.yaml")

          if not catalog_path.exists():
            print(f"[ERROR] No existe catálogo F02: {catalog_path}")
            sys.exit(1)

          if not params_path.exists():
            print(f"[ERROR] No existe params de F04: {params_path}")
            sys.exit(1)

          with catalog_path.open("r", encoding="utf-8") as f:
            catalog = json.load(f)

          with params_path.open("r", encoding="utf-8") as f:
            params = yaml.safe_load(f) or {}

          objective = params.get("prediction_objective", {})
          events = objective.get("events", [])

          print(f"[INFO] Eventos en catálogo F02: {len(catalog)}")
          sample = list(catalog.keys())[:20]
          print("[INFO] Ejemplos de eventos válidos del catálogo:")
          for ev in sample:
            print(f"  - {ev}")

          print("[INFO] Eventos pedidos por F04:")
          for ev in events:
            print(f"  - {ev}")

          missing = [ev for ev in events if ev not in catalog]
          if missing:
            print("[ERROR] Hay eventos del objetivo que no existen en el catálogo F02:")
            for ev in missing:
              print(f"  - {ev}")
            print("[SUGERENCIA] Usa nombres de eventos que existan en executions/02_prepareeventsds/v011/02_prepareeventsds_event_catalog.json")
            sys.exit(1)

          print("[OK] Todos los eventos objetivo existen en el catálogo F02.")
          PY
      
      - name: Subir resultados de la variante
        uses: actions/upload-artifact@v4
        with:
          name: variant-f4v201-variants
          path: executions/04_targetengineering/variants.yaml
          retention-days: 1

      - name: "[SYNC] Push variants de la fase 4"
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make push_variant_to_storage_fase4
      
      # - name: Ejecutar script de Fase 4
      #   run: make script4-run VARIANT=v201
      - name: Ejecutar script de Fase 4 (Con monitor de RAM)
        env:
          PYTHONFAULTHANDLER: 1 # Fuerza a Python a escupir todo el log si el sistema lo mata
        run: |
          # 1. Lanzamos un bucle en segundo plano que imprima la RAM cada 10 segundos
          (while true; do echo "[$(date '+%H:%M:%S')] RAM Libre:"; free -m | grep Mem; sleep 10; done) &
          MONITOR_PID=$!
          
          # 2. Ejecutamos tu script normal
          make script4-run VARIANT=v201
          
          # 3. Si termina bien, matamos el monitor de RAM
          kill $MONITOR_PID

      - name: Diagnóstico de error (Solo si falla)
        if: failure() # Esto hace que SOLO se ejecute si el paso anterior peta
        run: |
          echo "==== BUSCANDO ERRORES DE OUT OF MEMORY (OOM) ===="
          # Intentamos leer el dmesg del host (puede requerir privilegios en LXC)
          dmesg -T | grep -i -E "killed|oom|out of memory" || echo "No hay logs de OOM en dmesg."
          
          echo "==== ESTADO FINAL DE LA MEMORIA ===="
          free -m

      - name: Subir ejecución de Fase 4
        uses: actions/upload-artifact@v4
        with:
          name: run-f4v201-results
          path: executions/04_targetengineering/v201/
          retention-days: 1

      - name: "[SYNC] Push variante (v201) a GDrive"
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make push_to_storage_fase4 VARIANT=v201

      - name: Verificar resultados de Fase 4
        run: make script4-check-results VARIANT=v201

  fase5:
    needs: fase4
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/tehedor/mlops_actions/mlops-env:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
      FASE4_FOLDER_ID: ${{ secrets.FASE4_FOLDER_ID }}
      FASE5_FOLDER_ID: ${{ secrets.FASE5_FOLDER_ID }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Descargar credenciales de GDrive
        uses: actions/download-artifact@v4
        with:
          name: gdrive-credentials
          path: .mlops_tools/credentials/

      - name: Descargar Artifact de fase 4 variants
        uses: actions/download-artifact@v4
        with:
          name: variant-f4v201-variants
          path: executions/04_targetengineering/

      - name: Descargar Artifact de fase 4
        uses: actions/download-artifact@v4
        with:
          name: run-f4v201-results
          path: executions/04_targetengineering/v201/

      - name: "[SYNC] Push variants de la fase 4"
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make push_variant_to_storage_fase4

      - name: "[SYNC] Push variante padre (v201) a GDrive"
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make push_to_storage_fase4 VARIANT=v201
      
      - name: Crear variante Fase 5
        run: make variant5 VARIANT=v301 PARENT=v201 MODEL_FAMILY=dense_bow IMBALANCE_STRATEGY=rare_events IMBALANCE_MAX_MAJ=20000
      
      - name: Subir resultados de la variante
        uses: actions/upload-artifact@v4
        with:
          name: variant-f5v301-variants
          path: executions/05_modeling/variants.yaml
          retention-days: 1

      - name: "[SYNC] Push variants de la fase 5"
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make push_variant_to_storage_fase5
      
      - name: Ejecutar script de Fase 5
        run: make script5-run VARIANT=v301

      - name: Subir ejecución de Fase 5
        uses: actions/upload-artifact@v4
        with:
          name: run-f5v301-results
          path: executions/05_modeling/v301/
          retention-days: 1

      - name: "[SYNC] Push variante (v301) a GDrive"
        working-directory: .mlops_tools
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: make push_to_storage_fase5 VARIANT=v301

      - name: Verificar resultados de Fase 5
        run: make script5-check-results VARIANT=v301