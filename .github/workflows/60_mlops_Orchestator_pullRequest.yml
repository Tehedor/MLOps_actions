name: 🚦 API MLOps Orchestrator

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  fase1:
    uses: ./.github/Buena/reusable_fase1-Explore.yml
    with:
      variant_id: v003
      params_json: '{"RAW":"./data/raw.csv","CLEANING_STRATEGY":"basic","NAN_VALUES":"[-999999]"}'
    secrets: inherit

  fase2:
    needs: fase1
    uses: ./.github/Buena/reusable_fase2-PrepareEvents.yml
    with:
      variant_id: v011
      parent_variant: v003
      params_json: '{"BANDS":"5 15 25 35 65 75 85 95","STRATEGY":"transitions","NAN":"discard"}'
    secrets: inherit

  fase3:
    needs: fase2
    uses: ./.github/Buena/reusable_fase3-PrepareWindows.yml
    with:
      variant_id: v111
      parent_variant: v011
      params_json: '{"OW":"600","LT":"300","PW":"600","WS":"synchro","NAN":"discard"}'
    secrets: inherit

  fase4:
    needs: fase3
    uses: ./.github/Buena/reusable_fase4-TargetEngineering.yml
    with:
      variant_id: v201
      parent_variant: v111
      catalog_variant: v011
      params_json: '{"PREDICTION_NAME":"name","OBJECTIVE":"{operator: OR, events: [Battery_Active_Power_0_5-to-95_100, Battery_Active_Power_5_15-to-95_100, Battery_Active_Power_15_25-to-95_100, Battery_Active_Power_25_35-to-95_100, Battery_Active_Power_35_65-to-95_100, Battery_Active_Power_65_75-to-95_100, Battery_Active_Power_75_85-to-95_100, Battery_Active_Power_85_95-to-95_100]}"}'
    secrets: inherit

  fase5:
    needs: fase4
    uses: ./.github/Buena/reusable_fase5-Modeling.yml
    with:
      variant_id: v301
      parent_variant: v201
      params_json: '{"MODEL_FAMILY":"dense_bow","IMBALANCE_STRATEGY":"rare_events","IMBALANCE_MAX_MAJ":"20000"}'
    secrets: inherit