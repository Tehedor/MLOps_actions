# Configuracion remota para uso con GitHub + DagsHub.
# Este formato sigue exactamente lo que espera setup/setup.py.

git:
  mode: custom
  # URL del repositorio remoto donde publicar (SSH o HTTPS)
  remote_url: "git@github.com:Tehedor/MLOps_actions.git"

dvc:
  backend: dagshub
  # Formato esperado por setup.py: <owner>/<repo>
  repo: "Tehedor/MLOps_actions"

mlflow:
  enabled: true
  backend: dagshub
  tracking_uri: "https://dagshub.com/Tehedor/MLOps_actions.mlflow"

auth:
  # Variables de entorno requeridas por setup.py para backend dagshub
  dagshub_user_env: "DAGSHUB_USER"
  dagshub_token_env: "DAGSHUB_TOKEN"

notes: |
  - Exporta DAGSHUB_USER y DAGSHUB_TOKEN antes de make setup.
  - Ejecuta: make clean-setup && make setup SETUP_CFG=setup/remote.yaml && make check-setup.
